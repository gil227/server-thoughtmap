# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: thoughtmap
      POSTGRES_PASSWORD: thoughtmap
      POSTGRES_DB: thoughtmap
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: